name: Keep Alive - Render

on:
  schedule:
    # Ping cada 10 minutos para evitar cold start en Render free tier
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://bgr-shrimp.onrender.com/health --max-time 30)
          echo "Health check response: $response"
          if [ "$response" != "200" ]; then
            echo "Warning: Health check returned $response"
            exit 1
          fi
          echo "Server is alive"
